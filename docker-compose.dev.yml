services:

  redis:
    image: redis:7
    container_name: redis
    networks:
      - tracker-net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=${DISCOVERY_TYPE}
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED}
      - xpack.security.http.ssl.enabled=${XPACK_HTTP_SSL_ENABLED}
      - xpack.security.enrollment.enabled=${XPACK_ENROLLMENT_ENABLED}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    networks:
      - tracker-net
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k -u elastic:${ELASTIC_PASSWORD} ${ELASTIC_URL}/_cluster/health || exit 1"]
      interval: 10s
      retries: 20
      timeout: 10s
      start_period: 60s

  kibana-deployer:
    restart: on-failure
    build:
      context: ./kibana_deployer
      dockerfile: Dockerfile
    container_name: kibana_deployer
    networks:
      - tracker-net
    environment:
      - KIBANA_URL=${KIBANA_URL}
      - KIBANA_USERNAME=elastic
      - KIBANA_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/elastic_ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s
    entrypoint: python3 /app/main.py

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    restart: on-failure
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTIC_URL}
      - ELASTICSEARCH_USERNAME=${KIBANA_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - XPACK_SECURITY_ENABLED=${XPACK_SECURITY_ENABLED}
    networks:
      - tracker-net
    depends_on:
      kibana-deployer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 15s
      retries: 120
      start_period: 120s
      timeout: 10s

  log-server:
    restart: unless-stopped
    build:
      context: ./log_server
      dockerfile: Dockerfile
    container_name: log_server
    networks:
      - tracker-net
    ports:
      - "${LOG_SERVER_PORT:-8084}:${LOG_SERVER_PORT:-8084}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - PORT=${LOG_SERVER_PORT}
      - HOST=0.0.0.0
    entrypoint: python3 /app/main.py

  log-worker:
    restart: unless-stopped
    build:
      context: ./log_worker
      dockerfile: Dockerfile
    container_name: log_worker
    networks:
      - tracker-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      kibana:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_INDEX=${ELASTIC_INDEX}
      - BATCH_SIZE=${BATCH_SIZE}
      - MAX_WAIT_TIME=${MAX_WAIT_TIME}
    entrypoint: python3 /app/main.py

  web-app:
    restart: unless-stopped
    build:
      context: ./web_app
      dockerfile: Dockerfile
    container_name: web_app
    networks:
      - tracker-net
    ports:
      - "${WEB_APP_PORT:-8081}:${WEB_APP_PORT:-8081}"
    depends_on:
      log-worker:
        condition: service_started
    environment:
      - PORT=${WEB_APP_PORT}
      - HOST=0.0.0.0
      - API_PORT=${LOG_SERVER_PORT}
      - WEB_APP_URL=http://web-app:${WEB_APP_PORT}
    entrypoint: python3 /app/app.py

  selenium-test:
    restart: unless-stopped
    build:
      context: ./selenium_test
      dockerfile: Dockerfile
    container_name: selenium_test
    networks:
      - tracker-net
    depends_on:
      web-app:
        condition: service_started
    environment:
      - WEB_APP_URL=http://web-app:${WEB_APP_PORT}
      - CHROMEDRIVER_PATH=${CHROMEDRIVER_PATH}
    entrypoint: python3 /app/main.py

networks:
  tracker-net:
    driver: bridge