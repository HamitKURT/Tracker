services:

  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - tracker-net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=${DISCOVERY_TYPE}
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED}
      - xpack.security.http.ssl.enabled=${XPACK_HTTP_SSL_ENABLED}
      - xpack.security.enrollment.enabled=${XPACK_ENROLLMENT_ENABLED}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    networks:
      - tracker-net
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k -u elastic:${ELASTIC_PASSWORD} ${ELASTIC_URL}/_cluster/health || exit 1"]
      interval: 10s
      retries: 20
      timeout: 10s
      start_period: 60s

  kibana-deployer:
    restart: on-failure
    build:
      context: ./kibana_deployer
      dockerfile: Dockerfile
    container_name: kibana_deployer
    networks:
      - tracker-net
    environment:
      - KIBANA_URL=${KIBANA_URL}
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/elastic_ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s
    entrypoint: python3 /app/main.py

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.2
    container_name: kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTIC_URL}
      - ELASTICSEARCH_USERNAME=${KIBANA_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - XPACK_SECURITY_ENABLED=${XPACK_SECURITY_ENABLED}
    networks:
      - tracker-net
    depends_on:
      kibana-deployer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 15s
      retries: 120
      start_period: 120s
      timeout: 10s

  log-server:
    restart: unless-stopped
    build:
      context: ./log_server
      dockerfile: Dockerfile
    container_name: log_server
    networks:
      - tracker-net
    ports:
      - "${LOG_SERVER_PORT:-8084}:${LOG_SERVER_PORT:-8084}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_QUEUE_KEY=${REDIS_QUEUE_KEY}
      - PORT=${LOG_SERVER_PORT:-8084}
      - HOST=0.0.0.0
    entrypoint: python3 /app/main.py

  log-worker:
    restart: unless-stopped
    build:
      context: ./log_worker
      dockerfile: Dockerfile
    container_name: log_worker
    networks:
      - tracker-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      kibana:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_INDEX=${ELASTIC_INDEX}
      - BATCH_SIZE=${BATCH_SIZE}
      - MAX_WAIT_TIME=${MAX_WAIT_TIME}
      - REDIS_QUEUE_KEY=${REDIS_QUEUE_KEY}
    entrypoint: python3 /app/main.py

networks:
  tracker-net:
    driver: bridge

volumes:
  es-data:
    driver: local
